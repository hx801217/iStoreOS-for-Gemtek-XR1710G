name: Build Extra Packages

on:
  workflow_dispatch:
  repository_dispatch:

env:
  REPO_URL: https://github.com/YYH2913/openwrt
  REPO_BRANCH: xr1710g-6.18-integration
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install deps
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz lshw mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Cache
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: ubuntu-22.04-xr1710g-extra-${{ env.REPO_BRANCH }}-v1
        prefix: ${{ github.workspace }}/openwrt

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Configure
      run: |
        cd openwrt
        cat > .config << 'CONFIGEOF'
CONFIG_TARGET_airoha=y
CONFIG_TARGET_airoha_an7581=y
CONFIG_TARGET_MULTI_PROFILE=y
CONFIG_TARGET_DEVICE_airoha_an7581_DEVICE_econet_xr1710g-ubi=y
CONFIG_DEVEL=y
CONFIG_PACKAGE_luci-app-airoha-flowsense=y
CONFIG_PACKAGE_luci-app-airoha-npu=y
CONFIG_PACKAGE_luci-app-mlo=y
CONFIG_PACKAGE_luci-app-w1700k-fancontrol=y
CONFIG_PACKAGE_luci-app-netspeedtest=y
CONFIG_PACKAGE_luci-base=y
CONFIG_PACKAGE_luci-mod-network=y
CONFIG_PACKAGE_iperf3=y
CONFIG_PACKAGE_curl=y
CONFIG_PACKAGE_librespeed-go=y
CONFIG_PACKAGE_wpad-basic-mbedtls=y
CONFIG_PACKAGE_kmod-mt7996e=y
CONFIG_PACKAGE_kmod-mt7996-firmware=y
CONFIG_PACKAGE_uboot-envtools=y
CONFIG_PACKAGE_fitblk=y
CONFIG_PACKAGE_kmod-i2c-an7581=y
CONFIG_PACKAGE_kmod-hwmon-nct7802=y
CONFIG_PACKAGE_kmod-phy-rtl8261n=y
CONFIG_PACKAGE_airoha-en7581-mt7996-npu-firmware=y
CONFIG_PACKAGE_kmod-tcp-bbr=y
CONFIG_VERSIONOPT=y
CONFIG_VERSION_DIST="iStoreOS"
CONFIG_VERSION_REPO="https://mirrors.cernet.edu.cn/openwrt/releases/%V"
CONFIGEOF
        make defconfig

    - name: Download
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Build
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Collect IPK packages
      run: |
        cd openwrt/bin/targets/*/packages
        mkdir -p $GITHUB_WORKSPACE/extra-ipk
        for pkg in airoha-flowsense airoha-npu mlo w1700k-fancontrol netspeedtest; do
          find . -name "*${pkg}*.ipk" -exec cp {} $GITHUB_WORKSPACE/extra-ipk/ \;
        done
        echo "Collected packages:"
        ls -la $GITHUB_WORKSPACE/extra-ipk/

    - name: Upload IPK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: extra-packages
        path: extra-ipk/
